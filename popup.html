<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      margin: 0;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      text-align: center;
    }
    .icon {
      width: 36px;
      height: 36px;
      margin: 0 auto 12px;
    }
    #message {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
    }
    #detail {
      margin-top: 8px;
      font-size: 12px;
      color: #888;
    }
    .sending #message { color: #C099FF; }
    .ok #message { color: #22c55e; }
    .err #message { color: #ef4444; }
    .err #detail { color: #ef4444; opacity: 0.7; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .sending .icon { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body class="sending">
  <img class="icon" src="icons/128.png" alt="">
  <div id="message">Clipping page...</div>
  <div id="detail"></div>
  <script src="popup.js"></script>
</body>
</html>
